  (balão + seta + 2 pontos) em cor única, com fill-rule="evenodd" para manter
  o centro do balão e o interior da seta vazados (deixam o canvas aparecer).
  Use currentColor para herdar a cor de quem renderiza (tema claro/escuro).
-->
