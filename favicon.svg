<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="7" fill="#6366f1"/>
  <!-- top node -->
  <rect x="10" y="4" width="12" height="7" rx="2" fill="white"/>
  <!-- stem -->
  <line x1="16" y1="11" x2="16" y2="16" stroke="white" stroke-width="1.5"/>
  <!-- branch -->
  <line x1="9" y1="16" x2="23" y2="16" stroke="white" stroke-width="1.5"/>
  <!-- left drop -->
  <line x1="9" y1="16" x2="9" y2="18" stroke="white" stroke-width="1.5"/>
  <!-- right drop -->
  <line x1="23" y1="16" x2="23" y2="18" stroke="white" stroke-width="1.5"/>
  <!-- bottom-left node -->
  <rect x="4" y="18" width="10" height="7" rx="2" fill="white"/>
  <!-- bottom-right node -->
  <rect x="18" y="18" width="10" height="7" rx="2" fill="white"/>
  <!-- bottom center connector dot -->
  <circle cx="16" cy="16" r="1.5" fill="white"/>
</svg>
