<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowViewer — Agente construtor (PoC)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f11;
      color: #e2e2e2;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      flex-shrink: 0;
      padding: 10px 16px;
      background: #16161d;
      border-bottom: 1px solid #25253a;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }
    header strong { color: #c4b5fd; }
    #conn-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f87171;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    #conn-dot.ok  { background: #4ade80; }
    #conn-dot.run { background: #facc15; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    #conn-label { color: #888; }

    /* ── Output ─────────────────────────────────────────────── */
    #output {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      max-width: 680px;
      line-height: 1.55;
      font-size: 14px;
      border-radius: 4px 16px 16px 16px;
      padding: 10px 14px;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .bubble.user {
      align-self: flex-end;
      background: #2563eb;
      color: #fff;
      border-radius: 16px 16px 4px 16px;
    }
    .bubble.assistant {
      align-self: flex-start;
      background: #1e1e2a;
      border: 1px solid #2a2a3d;
    }
    .bubble.tool {
      align-self: flex-start;
      background: #0d1f14;
      border: 1px solid #1c3826;
      border-radius: 8px;
      font-family: ui-monospace, monospace;
      font-size: 12px;
      color: #4ade80;
      padding: 5px 12px;
      white-space: normal;
    }
    .bubble.tool .tname { font-weight: 700; }
    .bubble.flow-ok {
      align-self: flex-start;
      background: #0d1524;
      border: 1px solid #1a3060;
      border-radius: 8px;
      font-size: 12px;
      color: #60a5fa;
      padding: 5px 12px;
    }
    .bubble.error {
      align-self: flex-start;
      background: #200e0e;
      border: 1px solid #5c1c1c;
      border-radius: 8px;
      font-size: 13px;
      color: #fca5a5;
      padding: 8px 14px;
    }
    .bubble.error strong { color: #f87171; }

    /* ── Input area ──────────────────────────────────────────── */
    #form {
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: #16161d;
      border-top: 1px solid #25253a;
    }
    #prompt-input {
      flex: 1;
      background: #0f0f14;
      border: 1px solid #35354a;
      border-radius: 10px;
      color: #e2e2e2;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
      min-width: 0;
    }
    #prompt-input:focus { border-color: #4f46e5; }
    #prompt-input:disabled { opacity: 0.45; cursor: not-allowed; }
    #send-btn {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #send-btn:hover:not(:disabled) { background: #4338ca; }
    #send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .spin { display: inline-block; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div id="conn-dot"></div>
  <span id="conn-label">Conectando…</span>
  <span style="margin-left:auto;color:#555;">
    <strong>FlowViewer</strong> · Agente construtor (PoC local)
  </span>
</header>

<div id="output"></div>

<form id="form" autocomplete="off">
  <input
    id="prompt-input"
    type="text"
    placeholder="Instrua o agente… ex: Crie um nó de mensagem chamado boas_vindas com o texto Olá!"
    disabled
  />
  <button id="send-btn" type="submit" disabled>Enviar</button>
</form>

<script>
  const output     = document.getElementById('output')
  const form       = document.getElementById('form')
  const promptEl   = document.getElementById('prompt-input')
  const sendBtn    = document.getElementById('send-btn')
  const connDot    = document.getElementById('conn-dot')
  const connLabel  = document.getElementById('conn-label')

  let running = false
  let assistantBubble = null  // bubble atual do agente (acumula texto streaming)

  // ── UI helpers ──────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  }

  function addBubble(cls, html) {
    const div = document.createElement('div')
    div.className = 'bubble ' + cls
    div.innerHTML = html
    output.appendChild(div)
    output.scrollTop = output.scrollHeight
    return div
  }

  function setRunning(val) {
    running = val
    promptEl.disabled = val
    sendBtn.disabled  = val
    sendBtn.innerHTML = val
      ? '<span class="spin">↻</span> Aguarde'
      : 'Enviar'
    connDot.className = val ? 'run' : 'ok'
    if (!val) connLabel.textContent = 'Pronto'
  }

  // ── WebSocket ───────────────────────────────────────────────────────────────
  const ws = new WebSocket('ws://' + location.host)

  ws.onopen = () => {
    connDot.className = 'ok'
    connLabel.textContent = 'Conectado'
    promptEl.disabled = false
    sendBtn.disabled  = false
    promptEl.focus()
  }

  ws.onclose = () => {
    connDot.className = ''
    connLabel.textContent = 'Desconectado — recarregue a página'
    promptEl.disabled = true
    sendBtn.disabled  = true
    running = false
  }

  ws.onerror = () => {
    connLabel.textContent = 'Erro na conexão'
  }

  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data)

    if (msg.type === 'text') {
      // Acumula texto streaming na mesma bubble
      if (!assistantBubble) {
        assistantBubble = addBubble('assistant', '')
      }
      assistantBubble.textContent += msg.text
      output.scrollTop = output.scrollHeight

    } else if (msg.type === 'tool') {
      assistantBubble = null
      const inputStr = JSON.stringify(msg.input ?? {}).slice(0, 140)
      addBubble('tool',
        '<span class="tname">' + esc(msg.name) + '</span>(' + esc(inputStr) + ')'
      )

    } else if (msg.type === 'flow-updated') {
      assistantBubble = null
      const n = msg.nodeCount
      addBubble('flow-ok',
        '✓ Fluxo atualizado — ' + n + ' nó' + (n !== 1 ? 's' : '')
      )

    } else if (msg.type === 'done') {
      assistantBubble = null
      setRunning(false)
      promptEl.focus()

    } else if (msg.type === 'error') {
      assistantBubble = null
      addBubble('error', '<strong>Erro:</strong> ' + esc(msg.message))
      setRunning(false)

    } else if (msg.type === 'status') {
      connLabel.textContent = msg.text
    }
  }

  // ── Submit ──────────────────────────────────────────────────────────────────
  form.addEventListener('submit', (e) => {
    e.preventDefault()
    const text = promptEl.value.trim()
    if (!text || running || ws.readyState !== WebSocket.OPEN) return

    addBubble('user', esc(text))
    promptEl.value = ''
    assistantBubble = null
    setRunning(true)
    connLabel.textContent = 'Turno em andamento…'
    ws.send(text)
  })
</script>

</body>
</html>
